name: Release Stoicheia

on:
  workflow_dispatch:
  push:
    branches:
      - release
    tags:
      - 'v*'
      - 'stoicheia-v*'

jobs:
  publish-tauri:
    name: Release ${{ matrix.name }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            platform: ubuntu-22.04
            args: ''
            no_strip: '1'
          - name: Windows
            platform: windows-latest
            args: ''
          - name: macOS Apple Silicon
            platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin x86_64-apple-darwin
          - name: macOS Intel
            platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_targets: aarch64-apple-darwin x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils \
            libwebkit2gtk-4.1-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS Rust targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --run

      - name: Publish Stoicheia release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: '-'
          NO_STRIP: ${{ matrix.no_strip }}
        with:
          projectPath: .
          tauriScript: npm run tauri
          tagName: stoicheia-v__VERSION__
          releaseName: Stoicheia v__VERSION__
          releaseBody: Download the installer for your platform from the assets below.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
